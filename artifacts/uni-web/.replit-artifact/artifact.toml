kind = "web"
previewPath = "/uni-web/"
title = "uni.id Web"
version = "1.0.0"
id = "artifacts/uni-web"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/uni-web/" ]
localPort = 8080

[services.development]
run = "echo 'served by api-server'"

[services.production]
build = [ "pnpm", "--filter", "@workspace/uni-web", "run", "build" ]
publicDir = "artifacts/uni-web/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
BASE_PATH = "/uni-web/"
