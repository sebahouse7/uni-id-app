kind = "mobile"
previewPath = "/"
title = "uni.ud"
version = "1.0.0"
id = "artifacts/uni-ud"
router = "expo-domain"

[[integratedSkills]]
name = "expo"
version = "1.0.0"

[[services]]
ensurePreviewReachable = "/status"
name = "expo"
paths = [ "/" ]
localPort = 24796

[services.development]
run = "pnpm --filter @workspace/uni-ud run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/uni-ud", "run", "build" ]
run = [ "pnpm", "--filter", "@workspace/uni-ud", "run", "serve" ]

[services.production.env]
EXPO_PUBLIC_API_URL = "/api"
NODE_ENV = "production"

[services.env]
PORT = "24796"
BASE_PATH = "/"
