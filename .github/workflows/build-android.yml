name: Build Android APK

on:
  push:
    branches: [main, master]
    paths:
      - 'artifacts/uni-ud/**'
      - '.github/workflows/build-android.yml'
      - '.github/signing-keystore.b64'
  workflow_dispatch:

jobs:
  build:
    name: Build Android APK
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install workspace dependencies (hoisted for Metro bundler)
        run: pnpm install --no-frozen-lockfile --shamefully-hoist

      - name: Run Expo Prebuild
        working-directory: artifacts/uni-ud
        env:
          EXPO_NO_GIT_STATUS: '1'
          EAS_NO_VCS: '1'
          EXPO_PUBLIC_API_URL: 'https://expressjs-production-8bfc.up.railway.app/api'
        run: npx expo prebuild --platform android --clean --no-install

      - name: Decode signing keystore
        run: |
          KEYSTORE_PATH="$GITHUB_WORKSPACE/artifacts/uni-ud/android/app/uniid-release.keystore"
          base64 -d .github/signing-keystore.b64 > "$KEYSTORE_PATH"
          echo "KEYSTORE_PATH=$KEYSTORE_PATH" >> $GITHUB_ENV
          echo "Keystore: $(ls -lh $KEYSTORE_PATH | awk '{print $5}')"

      - name: Build Release APK (signed)
        working-directory: artifacts/uni-ud/android
        run: |
          chmod +x gradlew
          ./gradlew assembleRelease --no-daemon -Dfile.encoding=UTF-8 \
            -Pandroid.injected.signing.store.file="$KEYSTORE_PATH" \
            -Pandroid.injected.signing.store.password="uniid2024release" \
            -Pandroid.injected.signing.key.alias="uniid-key" \
            -Pandroid.injected.signing.key.password="uniid2024release"
          echo "Build OK — buscando APK..."
          find "$GITHUB_WORKSPACE/artifacts/uni-ud/android/app/build/outputs" -name "*.apk" 2>/dev/null

      - name: Find and package APK
        run: |
          DATE=$(date +%Y%m%d)
          BUILD_NUM=${{ github.run_number }}
          mkdir -p /tmp/apk-output

          # Search broadly using absolute path
          APK_SRC=$(find "$GITHUB_WORKSPACE/artifacts/uni-ud/android/app/build/outputs" -name "*.apk" 2>/dev/null | head -1)
          echo "APK encontrado: $APK_SRC"

          if [ -z "$APK_SRC" ]; then
            echo "❌ No APK. Estructura de build:"
            find "$GITHUB_WORKSPACE/artifacts/uni-ud/android/app/build" -type d 2>/dev/null | head -20
            exit 1
          fi

          APK_NAME="uni-id-v${BUILD_NUM}-${DATE}.apk"
          cp "$APK_SRC" "/tmp/apk-output/$APK_NAME"
          SIZE=$(ls -lh "/tmp/apk-output/$APK_NAME" | awk '{print $5}')
          echo "APK_FILE=/tmp/apk-output/$APK_NAME" >> $GITHUB_ENV
          echo "APK_NAME=$APK_NAME" >> $GITHUB_ENV
          echo "✅ APK: $APK_NAME ($SIZE)"

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: uni-id-apk-${{ github.run_number }}
          path: ${{ env.APK_FILE }}
          retention-days: 30

      - name: Build summary
        run: |
          SIZE=$(ls -lh ${{ env.APK_FILE }} | awk '{print $5}')
          echo "## ✅ uni.id APK compilado exitosamente" >> $GITHUB_STEP_SUMMARY
          echo "| Campo | Valor |" >> $GITHUB_STEP_SUMMARY
          echo "|-------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| Archivo | \`${{ env.APK_NAME }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Tamaño | $SIZE |" >> $GITHUB_STEP_SUMMARY
          echo "| Build # | ${{ github.run_number }} |" >> $GITHUB_STEP_SUMMARY
