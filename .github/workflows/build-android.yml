name: Build Android APK

on:
  push:
    branches: [main, master]
    paths:
      - 'artifacts/uni-ud/**'
      - '.github/workflows/build-android.yml'
  workflow_dispatch:

jobs:
  build:
    name: Build Android APK
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install dependencies
        working-directory: artifacts/uni-ud
        run: pnpm install --no-frozen-lockfile

      - name: Install root dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Run Expo Prebuild
        working-directory: artifacts/uni-ud
        env:
          EXPO_NO_GIT_STATUS: '1'
          EAS_NO_VCS: '1'
          EXPO_PUBLIC_API_URL: 'https://expressjs-production-8bfc.up.railway.app/api'
        run: npx expo prebuild --platform android --clean --no-install

      - name: Build Debug APK
        working-directory: artifacts/uni-ud/android
        run: |
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon -Dfile.encoding=UTF-8

      - name: Rename APK with version and date
        run: |
          DATE=$(date +%Y%m%d)
          mkdir -p /tmp/apk-output
          cp artifacts/uni-ud/android/app/build/outputs/apk/debug/app-debug.apk \
             /tmp/apk-output/uni-id-v${{ github.run_number }}-${DATE}.apk
          echo "APK_FILE=/tmp/apk-output/uni-id-v${{ github.run_number }}-${DATE}.apk" >> $GITHUB_ENV
          echo "APK_NAME=uni-id-v${{ github.run_number }}-${DATE}.apk" >> $GITHUB_ENV

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: uni-id-apk-${{ github.run_number }}
          path: ${{ env.APK_FILE }}
          retention-days: 30

      - name: Show download info
        run: |
          echo "✅ APK generado exitosamente"
          echo "📱 Nombre: ${{ env.APK_NAME }}"
          echo "📥 Descargalo desde: Actions → este workflow → Artifacts"
